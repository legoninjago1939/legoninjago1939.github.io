<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>

<body>
<nav>
    <div>
        <h2>Inventory Command Center</h2>
        <p style="color:#7ec8e3; margin:0; font-size:14px;">ABC Logistics - Warehouse Dashboard</p>
    </div>
    <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="about.html">Developer Profile</a></li>
    </ul>
</nav>

<div class="container">

    <h1>🏁 Inventory Dashboard</h1>

    <div id="lowStockAlert" class="alert-banner" style="display:none;">
        ⚠ Warning: Some items are low on stock!
    </div>

    <form id="inventoryForm">
        <input type="text" id="itemName" placeholder="Item Name" required>
        <input type="number" id="itemQty" placeholder="Quantity" required>
        <button type="submit">Add / Update</button>
    </form>

    <button id="clearInventory">Clear All Inventory</button>

    <div class="dashboard-cards">
        <div class="card" id="totalItemsCard">Total Items: 0</div>
        <div class="card" id="totalQuantityCard">Total Quantity: 0</div>
        <div class="card" id="lowStockCard">Low Stock Items: 0</div>
    </div>

    <h2>Inventory List</h2>
    <ul id="inventoryList"></ul>

    <!-- Toggle Button -->
    <button id="toggleChart">Switch to Pie Chart</button>

    <div class="chart-container">
        <h2>Stock Overview</h2>
        <canvas id="inventoryChart"></canvas>
        <canvas id="inventoryPieChart" style="display:none;"></canvas>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
